services:

  web:
    image: ubuntu:24.04
    container_name: web-server

    ports:
      - "2222:22"

    environment:
      DEBIAN_FRONTEND: noninteractive
      TZ: Asia/Bangkok

    tty: true

    command: >
      bash -c "
      apt update &&
      apt install -y git openssh-server wget php php-cli php-mysql mysql-client &&
      mkdir /var/run/sshd &&
      echo 'root:mle123960' | chpasswd &&
      /usr/sbin/sshd &&
      tail -f /dev/null
      "

    depends_on:
      - mysql

  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "8443:8080"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - web

  mysql:
    image: mysql:8

    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: Hello@123
      MYSQL_DATABASE: A-NETH_Tithyarita-db

    ports:
      - "3307:3306"